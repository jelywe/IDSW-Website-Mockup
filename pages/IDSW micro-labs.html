<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IDSW – Microbiology Labs Directory</title>

  <link rel="stylesheet" href="../css/IDSW style.css">
  <link rel="stylesheet" href="../css/IDSW link section style.css">

  <style>
    .results-meta {
      font-size: 13px;
      color: #666;
      margin: 10px 2px 12px;
    }

    .top-split {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    .search-filter-bar.practice-search {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
    }

    .map-panel {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 18px 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .map-panel h2 {
      font-size: 18px;
      color: var(--brand-ink);
      margin-bottom: 10px;
    }

    .map-panel img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      display: block;
      background: #ffffff;
    }

    .map-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .lab-health-system {
      font-size: 14px;
      color: var(--brand);
      font-weight: 700;
      margin-top: 4px;
      line-height: 1.35;
    }

    .lab-info-grid {
      display: grid;
      grid-template-columns: max-content max-content;
      gap: 28px;
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
      align-items: start;
    }

    .lab-info-block div {
      margin-bottom: 2px;
    }

    .lab-info-block strong,
    .lab-services-label {
      color: var(--brand-ink);
    }

    .lab-services {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .lab-services-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--brand-ink);
      margin-right: 4px;
    }

    .lab-services-text {
      color: var(--muted);
    }

    .directory-card .card-result h2 {
      margin-bottom: 0;
    }

    .directory-card .card-actions {
      align-self: center;
    }

    .loading-message,
    .empty-message,
    .error-message {
      font-size: 15px;
      color: var(--muted);
      padding: 18px 0;
    }

    .error-message {
      color: #8a2f2f;
    }

    @media (max-width: 900px) {
      .top-split {
        grid-template-columns: 1fr;
      }

      .map-panel img {
        height: 260px;
      }
    }

    @media (max-width: 800px) {
      .lab-info-grid {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .directory-card .card-actions {
        align-self: flex-start;
      }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main>
    <div class="directory-header">
      <h1>Washington Microbiology Labs Directory</h1>
      <p>Search microbiology laboratories across Washington State by region, health system, location, or services.</p>
    </div>

    <section class="top-split">
      <section class="search-filter-bar practice-search">
        <div>
          <label for="search">Search by lab name, health system, city, address, phone, fax, or service</label>
          <input id="search" type="text" placeholder="e.g., Seattle, UW, Spokane, PCR, Blood Culture">
        </div>

        <div>
          <label for="region">Region</label>
          <select id="region">
            <option value="">All regions</option>
          </select>
        </div>

        <div>
          <label for="service">Lab Service</label>
          <select id="service">
            <option value="">All lab services</option>
          </select>
        </div>
      </section>

      <aside class="map-panel">
        <h2>Washington State Map</h2>
        <img
          src="../Images/Washington Map Placeholder.png"
          alt="Map of Washington State">
        <div class="map-note">
          Placeholder map image.
        </div>
      </aside>
    </section>

    <div id="results-meta" class="results-meta">
      Loading microbiology labs…
    </div>

    <section id="lab-results" class="directory-list">
      <div class="loading-message">Loading microbiology labs…</div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    let allLabs = [];

    fetch("../includes/IDSW%20header.html")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load header.html");
        return r.text();
      })
      .then(html => {
        document.getElementById("site-header").innerHTML = html;
      })
      .catch(err => console.error(err));

    fetch("../includes/IDSW%20footer.html")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load footer.html");
        return r.text();
      })
      .then(html => {
        document.getElementById("site-footer").innerHTML = html;
      })
      .catch(err => console.error(err));

    /*
      Microbiology Labs CSV loader

      Editors update:
      ../Data/micro-labs.csv

      CSV columns:
      sort_order,avatar,name,health_system,street_address,city,state,zip,region,phone,fax,lab_services,website,active

      lab_services:
      Separate multiple lab services with semicolons.
      Example:
      Bacteriology;Virology / PCR;Blood Cultures

      active:
      yes = show listing
      no = hide listing
    */

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && nextChar === "\n") {
            i++;
          }

          currentRow.push(currentValue.trim());

          if (currentRow.some(value => value !== "")) {
            rows.push(currentRow);
          }

          currentRow = [];
          currentValue = "";
        } else {
          currentValue += char;
        }
      }

      currentRow.push(currentValue.trim());

      if (currentRow.some(value => value !== "")) {
        rows.push(currentRow);
      }

      return rows;
    }

    function csvRowsToObjects(rows) {
      if (!rows.length) {
        return [];
      }

      const headers = rows[0].map(header => header.trim());

      return rows.slice(1).map(row => {
        const item = {};

        headers.forEach((header, index) => {
          item[header] = row[index] ? row[index].trim() : "";
        });

        return item;
      });
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function isActive(value) {
      return normalize(value) !== "no";
    }

    function splitLabServices(value) {
      return String(value || "")
        .split(";")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function safeURL(value) {
      const url = String(value || "").trim();

      if (!url) {
        return "";
      }

      if (url.startsWith("http://") || url.startsWith("https://")) {
        return url;
      }

      return "";
    }

    function addOptionsToSelect(selectId, values) {
      const select = document.getElementById(selectId);

      if (!select) {
        return;
      }

      const firstOption = select.querySelector("option");
      select.innerHTML = "";

      if (firstOption) {
        select.appendChild(firstOption);
      }

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function populateFilters(labs) {
      const regions = uniqueSorted(labs.map(lab => lab.region));

      const labServices = uniqueSorted(
        labs.flatMap(lab => splitLabServices(lab.lab_services))
      );

      addOptionsToSelect("region", regions);
      addOptionsToSelect("service", labServices);
    }

    function createLabCard(lab) {
      const avatar = escapeHTML(lab.avatar || "LAB");
      const name = escapeHTML(lab.name || "[Lab Name]");
      const healthSystem = escapeHTML(lab.health_system || "");
      const streetAddress = escapeHTML(lab.street_address || "");
      const city = escapeHTML(lab.city || "");
      const state = escapeHTML(lab.state || "WA");
      const zip = escapeHTML(lab.zip || "");
      const region = escapeHTML(lab.region || "");
      const phone = escapeHTML(lab.phone || "");
      const fax = escapeHTML(lab.fax || "");
      const labServices = splitLabServices(lab.lab_services);
      const servicesText = labServices.length ? labServices.join(", ") : "";
      const website = safeURL(lab.website);

      const cityStateZip = city && (state || zip)
        ? `${city}, ${[state, zip].filter(Boolean).join(" ")}`
        : [city, state, zip].filter(Boolean).join(" ");

      const addressMarkup = `
        <div class="lab-info-block">
          ${streetAddress ? `<div>${streetAddress}</div>` : ""}
          ${cityStateZip ? `<div>${cityStateZip}</div>` : ""}
          ${region ? `<div>${region}</div>` : ""}
        </div>
      `;

      const phoneFaxMarkup = `
        <div class="lab-info-block">
          ${phone ? `<div><strong>Phone:</strong> ${phone}</div>` : ""}
          ${fax ? `<div><strong>Fax:</strong> ${fax}</div>` : ""}
        </div>
      `;

      const servicesMarkup = servicesText
      ? `
        <div class="lab-services">
          <span class="lab-services-label">Services:</span>
          <span class="lab-services-text">${escapeHTML(servicesText)}</span>
        </div>
      `
      : "";

      const websiteButton = website
        ? `<a class="btn-tertiary" href="${escapeHTML(website)}" target="_blank" rel="noopener noreferrer">View details</a>`
        : `<button class="btn-tertiary" type="button">View details</button>`;

      return `
        <article class="directory-card">
          <div class="member-avatar">${avatar}</div>

          <div class="card-result">
            <h2>${name}</h2>
            ${healthSystem ? `<div class="lab-health-system">${healthSystem}</div>` : ""}

            <div class="lab-info-grid">
              ${addressMarkup}
              ${phoneFaxMarkup}
            </div>

            ${servicesMarkup}
          </div>

          <div class="card-actions">
            ${websiteButton}
          </div>
        </article>
      `;
    }

    function updateResultsMeta(count) {
      const resultsMeta = document.getElementById("results-meta");

      if (!resultsMeta) {
        return;
      }

      const label = count === 1 ? "lab" : "labs";
      resultsMeta.textContent = `Showing ${count} ${label}. Actual contact details and visibility can be adjusted based on directory settings.`;
    }

    function getFilteredLabs() {
      const searchValue = normalize(document.getElementById("search").value);
      const regionValue = document.getElementById("region").value;
      const serviceValue = document.getElementById("service").value;

      return allLabs.filter(lab => {
        const labServices = splitLabServices(lab.lab_services);

        const searchableText = normalize([
          lab.avatar,
          lab.name,
          lab.health_system,
          lab.street_address,
          lab.city,
          lab.state,
          lab.zip,
          lab.region,
          lab.phone,
          lab.fax,
          lab.lab_services
        ].join(" "));

        const matchesSearch = !searchValue || searchableText.includes(searchValue);
        const matchesRegion = !regionValue || lab.region === regionValue;
        const matchesService = !serviceValue || labServices.includes(serviceValue);

        return matchesSearch && matchesRegion && matchesService;
      });
    }

    function renderLabs(labs) {
      const container = document.getElementById("lab-results");

      if (!container) {
        return;
      }

      if (!labs.length) {
        container.className = "";
        container.innerHTML = `
          <div class="empty-message">
            No labs match the selected filters.
          </div>
        `;
        updateResultsMeta(0);
        return;
      }

      container.className = "directory-list";
      container.innerHTML = labs.map(createLabCard).join("");
      updateResultsMeta(labs.length);
    }

    function applyFilters() {
      renderLabs(getFilteredLabs());
    }

    function loadLabs() {
      fetch("../Data/micro-labs.csv")
        .then(response => {
          if (!response.ok) {
            throw new Error("Could not load micro-labs.csv");
          }

          return response.text();
        })
        .then(csvText => {
          const rows = parseCSV(csvText);

          allLabs = csvRowsToObjects(rows)
            .filter(lab => isActive(lab.active))
            .sort((a, b) => {
              const aOrder = Number(a.sort_order || 9999);
              const bOrder = Number(b.sort_order || 9999);
              return aOrder - bOrder;
            });

          populateFilters(allLabs);
          renderLabs(allLabs);
        })
        .catch(error => {
          console.error(error);

          const container = document.getElementById("lab-results");

          if (container) {
            container.className = "";
            container.innerHTML = `
              <div class="error-message">
                Microbiology lab directory information could not be loaded. Check that Data/micro-labs.csv exists.
              </div>
            `;
          }

          updateResultsMeta(0);
        });
    }

    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("region").addEventListener("change", applyFilters);
    document.getElementById("service").addEventListener("change", applyFilters);

    loadLabs();
  </script>
</body>
</html>

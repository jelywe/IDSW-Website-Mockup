<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IDSW – Practice Directory</title>

  <link rel="stylesheet" href="../css/IDSW style.css">
  <link rel="stylesheet" href="../css/IDSW link section style.css">

  <style>
    .results-meta {
      font-size: 13px;
      color: #666;
      margin: 10px 2px 12px;
    }

    /* Top split: search left, map right */
    .top-split {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    /* Make search stacked (each control on its own line) */
    .search-filter-bar.practice-search {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
    }

    .map-panel {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 18px 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .map-panel h2 {
      font-size: 18px;
      color: var(--brand-ink);
      margin-bottom: 10px;
    }

    .map-panel img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      display: block;
      background: #ffffff;
    }

    .map-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Practice directory card tweaks (reuse directory-card styles from your CSS) */
    .practice-meta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    .loading-message,
    .empty-message,
    .error-message {
      font-size: 15px;
      color: var(--muted);
      padding: 18px 0;
    }

    .error-message {
      color: #8a2f2f;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .top-split {
        grid-template-columns: 1fr;
      }

      .map-panel img {
        height: 260px;
      }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main>
    <div class="directory-header">
      <h1>Washington Infectious Diseases Practices Directory</h1>
      <p>Search infectious diseases practices and clinics across Washington State by region and clinical focus.</p>
    </div>

    <!-- Top split: Search (left) + Map (right) -->
    <section class="top-split">
      <!-- Search + filters (stacked) -->
      <section class="search-filter-bar practice-search">
        <div>
          <label for="search">Search by practice name, health system, city, address, or focus</label>
          <input id="search" type="text" placeholder="e.g., Seattle ID, UW, Tacoma, HIV, Travel">
        </div>

        <div>
          <label for="region">Region</label>
          <select id="region">
            <option value="">All regions</option>
          </select>
        </div>

        <div>
          <label for="specialty">Clinical Focus</label>
          <select id="specialty">
            <option value="">All focus areas</option>
          </select>
        </div>
      </section>

      <!-- Map panel -->
      <aside class="map-panel">
        <h2>Washington State Map (Placeholder)</h2>
        <img
          src="../Images/Washington Map Placeholder.png"
          alt="Map of Washington State (placeholder)">
        <div class="map-note">
          Placeholder map image.
        </div>
      </aside>
    </section>

    <div id="results-meta" class="results-meta">
      Loading practice directory…
    </div>

    <!-- Directory cards – one per row -->
    <section id="practice-results" class="directory-list">
      <div class="loading-message">Loading practice directory…</div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    let allPractices = [];

    /* Shared header */
    fetch("../includes/IDSW%20header.html")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load header.html");
        return r.text();
      })
      .then(html => {
        document.getElementById("site-header").innerHTML = html;
      })
      .catch(err => console.error(err));

    /* Shared footer */
    fetch("../includes/IDSW%20footer.html")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load footer.html");
        return r.text();
      })
      .then(html => {
        document.getElementById("site-footer").innerHTML = html;
      })
      .catch(err => console.error(err));

    /*
      Practice Directory CSV loader

      Editors update:
      ../Data/practices.csv

      CSV columns:
      sort_order,avatar,name,subtitle,address,city,state,region,clinical_focus,health_system,accepting_referrals,appointments,languages,telehealth,website,active

      clinical_focus:
      Separate multiple focus areas with semicolons.
      Example:
      HIV / PrEP;Travel Medicine;General ID

      active:
      yes = show listing
      no = hide listing
    */

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && nextChar === "\n") {
            i++;
          }

          currentRow.push(currentValue.trim());

          if (currentRow.some(value => value !== "")) {
            rows.push(currentRow);
          }

          currentRow = [];
          currentValue = "";
        } else {
          currentValue += char;
        }
      }

      currentRow.push(currentValue.trim());

      if (currentRow.some(value => value !== "")) {
        rows.push(currentRow);
      }

      return rows;
    }

    function csvRowsToObjects(rows) {
      if (!rows.length) {
        return [];
      }

      const headers = rows[0].map(header => header.trim());

      return rows.slice(1).map(row => {
        const item = {};

        headers.forEach((header, index) => {
          item[header] = row[index] ? row[index].trim() : "";
        });

        return item;
      });
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function isActive(value) {
      return normalize(value) !== "no";
    }

    function splitFocusAreas(value) {
      return String(value || "")
        .split(";")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function safeURL(value) {
      const url = String(value || "").trim();

      if (!url) {
        return "";
      }

      if (url.startsWith("http://") || url.startsWith("https://")) {
        return url;
      }

      return "";
    }

    function addOptionsToSelect(selectId, values) {
      const select = document.getElementById(selectId);

      if (!select) {
        return;
      }

      const firstOption = select.querySelector("option");
      select.innerHTML = "";

      if (firstOption) {
        select.appendChild(firstOption);
      }

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function populateFilters(practices) {
      const regions = uniqueSorted(practices.map(practice => practice.region));

      const focusAreas = uniqueSorted(
        practices.flatMap(practice => splitFocusAreas(practice.clinical_focus))
      );

      addOptionsToSelect("region", regions);
      addOptionsToSelect("specialty", focusAreas);
    }

    function createPracticeMeta(practice) {
      const metaParts = [];

      if (practice.health_system) {
        metaParts.push(`Health System: ${escapeHTML(practice.health_system)}`);
      }

      if (practice.accepting_referrals) {
        metaParts.push(`Accepting referrals: ${escapeHTML(practice.accepting_referrals)}`);
      }

      if (practice.appointments) {
        metaParts.push(`Appointments: ${escapeHTML(practice.appointments)}`);
      }

      if (practice.languages) {
        metaParts.push(`Languages: ${escapeHTML(practice.languages)}`);
      }

      if (practice.telehealth) {
        metaParts.push(`Telehealth: ${escapeHTML(practice.telehealth)}`);
      }

      return metaParts.join(" • ");
    }

    function createPracticeCard(practice) {
      const avatar = escapeHTML(practice.avatar || "ID");
      const name = escapeHTML(practice.name || "[Practice Name]");
      const subtitle = escapeHTML(practice.subtitle || "Infectious Diseases Practice");
      const address = escapeHTML(practice.address || "");
      const city = escapeHTML(practice.city || "");
      const state = escapeHTML(practice.state || "WA");
      const region = escapeHTML(practice.region || "");
      const focusAreas = splitFocusAreas(practice.clinical_focus);
      const focusText = focusAreas.length ? focusAreas.join(", ") : "[Focus areas]";
      const metaText = createPracticeMeta(practice);
      const website = safeURL(practice.website);

      const websiteButton = website
        ? `<a class="btn-tertiary" href="${escapeHTML(website)}" target="_blank" rel="noopener noreferrer">View details</a>`
        : `<button class="btn-tertiary" type="button">View details</button>`;

      const locationLine = `
        ${address ? address + "<br>" : ""}
        ${city}${city && state ? ", " : ""}${state}${region ? " • " + region : ""}
      `;

      return `
        <article class="directory-card">
          <div class="member-avatar">${avatar}</div>

          <div class="card-result">
            <h2>${name} – ${subtitle}</h2>
            <div class="title-line">${locationLine}</div>
            <div class="specialty">Focus: ${escapeHTML(focusText)}</div>
            ${metaText ? `<div class="practice-meta">${metaText}</div>` : ""}
          </div>

          <div class="card-actions">
            ${websiteButton}
          </div>
        </article>
      `;
    }

    function updateResultsMeta(count) {
      const resultsMeta = document.getElementById("results-meta");

      if (!resultsMeta) {
        return;
      }

      const label = count === 1 ? "practice" : "practices";
      resultsMeta.textContent = `Showing ${count} ${label}. Actual contact details and visibility can be adjusted based on directory settings.`;
    }

    function getFilteredPractices() {
      const searchValue = normalize(document.getElementById("search").value);
      const regionValue = document.getElementById("region").value;
      const specialtyValue = document.getElementById("specialty").value;

      return allPractices.filter(practice => {
        const focusAreas = splitFocusAreas(practice.clinical_focus);

        const searchableText = normalize([
          practice.avatar,
          practice.name,
          practice.subtitle,
          practice.address,
          practice.city,
          practice.state,
          practice.region,
          practice.clinical_focus,
          practice.health_system,
          practice.accepting_referrals,
          practice.appointments,
          practice.languages,
          practice.telehealth
        ].join(" "));

        const matchesSearch = !searchValue || searchableText.includes(searchValue);
        const matchesRegion = !regionValue || practice.region === regionValue;
        const matchesSpecialty = !specialtyValue || focusAreas.includes(specialtyValue);

        return matchesSearch && matchesRegion && matchesSpecialty;
      });
    }

    function renderPractices(practices) {
      const container = document.getElementById("practice-results");

      if (!container) {
        return;
      }

      if (!practices.length) {
        container.className = "";
        container.innerHTML = `
          <div class="empty-message">
            No practices match the selected filters.
          </div>
        `;
        updateResultsMeta(0);
        return;
      }

      container.className = "directory-list";
      container.innerHTML = practices.map(createPracticeCard).join("");
      updateResultsMeta(practices.length);
    }

    function applyFilters() {
      renderPractices(getFilteredPractices());
    }

    function loadPractices() {
      fetch("../Data/practices.csv")
        .then(response => {
          if (!response.ok) {
            throw new Error("Could not load practices.csv");
          }

          return response.text();
        })
        .then(csvText => {
          const rows = parseCSV(csvText);

          allPractices = csvRowsToObjects(rows)
            .filter(practice => isActive(practice.active))
            .sort((a, b) => {
              const aOrder = Number(a.sort_order || 9999);
              const bOrder = Number(b.sort_order || 9999);
              return aOrder - bOrder;
            });

          populateFilters(allPractices);
          renderPractices(allPractices);
        })
        .catch(error => {
          console.error(error);

          const container = document.getElementById("practice-results");

          if (container) {
            container.className = "";
            container.innerHTML = `
              <div class="error-message">
                Practice directory information could not be loaded. Check that Data/practices.csv exists.
              </div>
            `;
          }

          updateResultsMeta(0);
        });
    }

    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("region").addEventListener("change", applyFilters);
    document.getElementById("specialty").addEventListener("change", applyFilters);

    loadPractices();
  </script>
</body>
</html>
